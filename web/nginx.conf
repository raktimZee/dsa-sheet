# Serves the built SPA. The EDGE nginx handles /api; this container only serves static files
# and falls back to index.html so client-side routes (/security, /login…) work on refresh.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
    # index.html must always be revalidated so new deploys are picked up immediately
    # (the JS/CSS it references are content-hashed and cached below).
    add_header Cache-Control "no-cache";
  }

  # Long-cache hashed assets (filenames change on every build).
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
