# Serves the built SPA. The EDGE nginx handles /api; this container only serves static files
# and falls back to index.html so client-side routes (/security, /login…) work on refresh.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
