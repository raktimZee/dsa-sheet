# Single public origin. Browser only ever talks to nginx:80.
#   /api/*  -> gateway (which authenticates and fans out to services)
#   /*      -> the React SPA (static build, served by the `web` container)
# Same-origin means no CORS.
#
# We resolve upstreams via Docker's embedded DNS (127.0.0.11) at request time using variables,
# so if `gateway`/`web` containers restart and get new IPs, nginx picks them up without a reload.

server {
  listen 80;
  server_name _;

  resolver 127.0.0.11 ipv6=off valid=10s;

  # API — pass the original /api/... URI through; the gateway owns that prefix.
  location /api/ {
    set $gateway_upstream http://gateway:4000;
    proxy_pass $gateway_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA static assets + client-side routing fallback.
  location / {
    set $web_upstream http://web:80;
    proxy_pass $web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
